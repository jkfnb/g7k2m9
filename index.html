<style>

}

.searchbar{

}
.searchbox{position:relative}

<script>
/* ════════════════════════════════════════════════
   설정 — 실제 운영 시 여기 두 줄만 채우면 됩니다
   ════════════════════════════════════════════════ */
const API_URL   = "https://script.google.com/macros/s/AKfycbw4PfitRIHXYyyISQ8cG-4QrIrX9oZsxuKwQWkHPqDHqASeX8hCCLGwFjWqXNn49zvH/exec";          // 앱스 스크립트 배포 주소
const PHOTO_BASE    = "photos/"; // 사진 폴더 경로

/* 시트 게시 전까지 쓰는 예시 데이터 */
const SAMPLE = [
  {업체명:"엠브레인", 상태:"활성", 타입1:"베이직+", 타입2:"이동급식", 운영요일:"월화수목금",
   도착:"10:30", 배식:"12:00~13:00", 회수:"13:00 이후", 식수:"60~80",
   주소:"서울 서초구 명달로 9",
   진입주차:"지하주차장(지하4층 주차)", 출입절차:"없음",
   세팅:"지하4층 → 엘리베이터 → 1층 카페테리아", 퇴식회수:"1층", 특이사항:"배식도우미 1명"}
];

/* ── 유틸 ── */
const DAYS = ["일","월","화","수","목","금","토"];
const WEEK = ["월","화","수","목","금","토"];
const now = new Date();
const todayCh = DAYS[now.getDay()];

function parseCSV(text){
  const rows=[]; let row=[], cell="", q=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(q){
      if(c==='"'){ if(text[i+1]==='"'){cell+='"';i++;} else q=false; }
      else cell+=c;
    } else {
      if(c==='"') q=true;
      else if(c===','){ row.push(cell); cell=""; }
      else if(c==='\n'){ row.push(cell); rows.push(row); row=[]; cell=""; }
      else if(c!=='\r') cell+=c;
    }
  }
  if(cell||row.length){ row.push(cell); rows.push(row); }
  return rows;
}

function toObjects(rows){
  if(!rows.length) return [];
  const head = rows[0].map(h=>h.trim());
  return rows.slice(1)
    .filter(r=>r.some(v=>v && v.trim()))
    .map(r=>{ const o={}; head.forEach((h,i)=>o[h]=(r[i]||"").trim()); return o; })
    .filter(o=>{
      if(!o.업체명) return false;
      // 2행 안내문구 제거: 안내문에만 쓰이는 표현으로 판별
      const f=(o.폴더명||"")+(o.업체명||"");
      if(/사진 폴더명|기사님이 보는 이름|영문 소문자|사진 폴더 이름도/.test(f)) return false;
      return true;
    });
}

let currentName="";
let DATA=[], view="map", query="", map=null, overlays=[], mapReady=false;

/* ── 렌더링 ── */
/* 사진 폴더(구버전 호환) */
function folderOf(o){ return (o.폴더명||o.업체명||"").trim(); }
function hasSalad(o){ return o.샐러드==="Y" || /샐러드/.test(o.타입2||""); }
function type2Of(o){ return (o.타입2||"").replace(/\s*[+＋]?\s*샐러드/,"").trim(); }
function isVaryCount(o,v){ return o.식수변동==="Y" || /[~～]/.test(String(v||"")); }
/* 종료일이 있으면 이벤트 거래처 */
function isEvent(o){ return !!(o.종료일||"").trim() || o.계약==="이벤트"; }

function parseDate(v){
  const m=/(\d{4})\D+(\d{1,2})\D+(\d{1,2})/.exec(String(v||""));
  return m ? new Date(+m[1], +m[2]-1, +m[3]) : null;
}
/* 종료까지 남은 일수. 종료일 없으면 null */
function daysLeft(o){
  const d=parseDate(o.종료일); if(!d) return null;
  const t=new Date(); t.setHours(0,0,0,0);
  return Math.round((d-t)/86400000);
}
function endBadge(o){
  const n=daysLeft(o);
  if(n===null||n<0) return "";
  if(n===0) return `<span class="b dday now">오늘 종료</span>`;
  if(n<=14) return `<span class="b dday${n<=3?" soon":""}">종료 D-${n}</span>`;
  return "";
}
function isEnded(o){
  const d=parseDate(o.종료일); if(!d) return false;
  const t=new Date(); t.setHours(0,0,0,0);
  return d < t;
}
function daysShort(v){
  const t=(v||"").trim(); if(!t) return "";
  const idx=WEEK.map((d,i)=>t.includes(d)?i:-1).filter(i=>i>=0);
  if(!idx.length) return "";
  const consecutive=idx.every((v,i)=>i===0||v===idx[i-1]+1);
  if(consecutive&&idx.length>2) return `${WEEK[idx[0]]}~${WEEK[idx[idx.length-1]]}`;
  return idx.map(i=>WEEK[i]).join("·");
}
function isOpenToday(o){ return (o.운영요일||"").includes(todayCh); }
function isActive(o){ return (o.상태||"활성")!=="비활성" && !isEnded(o); }

/* 시간 · 식수 (상세) */
function mealRows(o){
  const line=(label,v)=>{
    const t=showTime(v); if(!t) return "";
    return `<div class="tline"><span class="tl">${label}</span><span class="tv">${t}</span></div>`;
  };
  const times=[line("도착",o.도착),line("배식",o.배식),line("회수",o.회수)].join("");
  const n=o.식수;
  if(!times && !n && !(o.추가끼니||"").trim()) return "";
  let html="";
  if(times||n){
    html+=`<div class="mealblock">
      ${n?`<div class="mbhead"><span class="mtag">중식</span>
        <span class="mcount">${isVaryCount(o,n)?"약 ":""}${n}명</span></div>`:""}
      ${times}
    </div>`;
  }
  if((o.추가끼니||"").trim()){
    html+=`<div class="mealblock">
      <div class="mbhead"><span class="mtag alt">추가</span></div>
      <div class="extrameal">${o.추가끼니}</div>
    </div>`;
  }
  return html;
}

function daysShort(v){
  const t=(v||"").trim(); if(!t) return "";
  const idx=WEEK.map((d,i)=>t.includes(d)?i:-1).filter(i=>i>=0);
  if(!idx.length) return "";
  const consecutive=idx.every((v,i)=>i===0||v===idx[i-1]+1);
  if(consecutive&&idx.length>2) return `${WEEK[idx[0]]}~${WEEK[idx[idx.length-1]]}`;
  return idx.map(i=>WEEK[i]).join("·");
}
function isOpenToday(o){ return (o.운영요일||"").includes(todayCh); }
function isActive(o){ return (o.상태||"활성")!=="비활성" && !isEnded(o); }



function visible(){
  if(query){
    const q=query.toLowerCase();
    return DATA.filter(o=>
      (o.업체명||"").toLowerCase().includes(q) ||
      (o.주소||"").toLowerCase().includes(q) ||
      (o.담당기사||"").toLowerCase().includes(q)
    );
  }
  return DATA.filter(isActive);
}

/* "10:40:00"→"10:40", "09:00이후"→"09:00 이후" 처럼 보기 좋게 */
function showTime(s){
  if(!s) return "";
  return String(s).trim()
    .replace(/(\d{1,2}):(\d{2}):\d{2}/g,"$1:$2")
    .replace(/(\d)(이후|이전|바로|경|쯤)/g,"$1 $2")
    .replace(/\s+/g," ");
}
/* 문자열에서 첫 시각을 분으로 */
function firstMin(s){
  if(!s) return null;
  const m=/(\d{1,2})\s*[:시]\s*(\d{2})?/.exec(String(s));
  return m ? (+m[1])*60 + (m[2]?+m[2]:0) : null;
}
/* 긴 시간 표기는 글자를 줄여 한 줄에 */
function tClass(v){ return showTime(v).length>7 ? ' style="font-size:13px"' : ""; }


function cardHTML(o,i){
  const open=isOpenToday(o), act=isActive(o), ev=isEvent(o), hasDays=!!(o.운영요일||"").trim();
  const dshort=daysShort(o.운영요일);
  const tag = act ? "" : (isEnded(o) ? "종료" : "비활성");
  const serve = showTime(o.배식);
  const n = o.식수;
  const cover = coverUrl(o);

  return `<button class="gcard${ev?" event":""}${!act?" inactive":(hasDays&&!open?" off":"")}" data-i="${i}">
    ${cover?`<div class="gphoto"><img src="${cover}" alt="" loading="lazy"
        onerror="this.closest('.gphoto').remove()"></div>`:""}
    <div class="gtags">
      ${o.타입1?`<span class="b type1 t-${(o.타입1||"").replace("+","플러스")}">${o.타입1}</span>`:""}
      ${ev?`<span class="b c-event">이벤트</span>`:""}
      ${tag?`<span class="b off-tag">${tag}</span>`:""}
      ${endBadge(o)}
    </div>
    <div class="gname">${o.업체명||""}</div>
    ${o.주소?`<div class="gaddr">${o.주소}</div>`:""}
    ${serve?`<div class="gtimes"><div class="gserve">
      <span class="gm">배식</span><span class="gt">${serve}</span>
    </div></div>`:""}
    ${(dshort||n)?`<div class="gfoot">
      ${dshort?`<span class="gdays${act&&hasDays&&!open?" rest":""}">${dshort}</span>`:""}
      ${n?`<span class="gcount">${isVaryCount(o,n)?"약 ":""}${n}명</span>`:""}
    </div>`:""}
  </button>`;
}

function renderList(){
  const v=visible();
  document.getElementById("count").textContent =
    query ? `검색 결과 ${v.length}곳` : `${v.length}곳 · 오늘 ${v.filter(isOpenToday).length}곳 운영`;
  document.getElementById("cards").innerHTML =
    v.length ? v.map(o=>cardHTML(o,DATA.indexOf(o))).join("")
             : `<div class="empty">${query?"찾는 업체가 없습니다.<br>이름 일부만 입력해보세요.":"등록된 업체가 없습니다."}</div>`;
}

/* ── 상세 ── */
/* 유튜브/드라이브 주소를 재생 가능한 형태로 */
function videoEmbed(u){
  u=(u||"").trim(); if(!u) return "";
  let m=/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([\w-]{6,})/.exec(u);
  if(m) return `https://www.youtube.com/embed/${m[1]}`;
  m=/drive\.google\.com\/file\/d\/([\w-]+)/.exec(u);
  if(m) return `https://drive.google.com/file/d/${m[1]}/preview`;
  return "";
}
function videoPanel(o){
  const raw=(o.영상||"").trim();
  if(!raw) return "";
  const parts=raw.split(/[\s,]+/).filter(Boolean);
  const items=parts.map(u=>{
    const e=videoEmbed(u);
    return e ? `<div class="vid"><iframe src="${e}" allow="fullscreen" allowfullscreen loading="lazy"></iframe></div>`
             : `<a class="mapbtn alt" href="${u}" target="_blank" rel="noopener">영상 열기</a>`;
  }).join("");
  return `<div class="panel"><h3>현장 영상</h3>${items}</div>`;
}

const PHOTO_SETS=[
  {title:"진입 · 주차", items:[["건물","건물 외관"],["진입","진입로"],["주차","주차 · 하차 위치"]]},
  {title:"배식 현장",  items:[["세팅","세팅 장소"],["배식대","배식대 완성 모습"],["퇴식구","퇴식구"]]}
];
const SLOT_NO={건물:1,진입:2,주차:3,세팅:4,배식대:5,퇴식구:6};

/* 사진 컬럼 형식: "건물:ID|진입:ID|..." */
function parsePhotos(s){
  const o={};
  String(s||"").split("|").forEach(p=>{
    const i=p.indexOf(":");
    if(i>0){ const k=p.slice(0,i).trim(), v=p.slice(i+1).trim(); if(k&&v) o[k]=v; }
  });
  return o;
}
function driveUrl(id,w){ return `https://drive.google.com/thumbnail?id=${id}&sz=w${w||1200}`; }

function photoUrl(o,slot){
  const ids=parsePhotos(o.사진);
  if(ids[slot]) return driveUrl(ids[slot]);
  const n=SLOT_NO[slot];
  return n ? `${PHOTO_BASE}${encodeURIComponent(folderOf(o))}/0${n}_${slot}.jpg` : "";
}
function coverUrl(o){
  const ids=parsePhotos(o.사진);
  if(ids["건물"]) return driveUrl(ids["건물"],600);
  return `${PHOTO_BASE}${encodeURIComponent(folderOf(o))}/01_건물.jpg`;
}

function shot(o,slot,caption){
  const src=photoUrl(o,slot);
  if(!src) return "";
  return `<figure class="shot" data-src="${src}" data-cap="${caption}">
    <div class="shotimg">
      <img src="${src}" alt="${caption}" loading="lazy"
           onerror="this.closest('.shot').remove()">
    </div>
    <figcaption>${caption}</figcaption>
  </figure>`;
}

function photoPanels(o){
  return PHOTO_SETS.map(set=>`
    <div class="panel photopanel">
      <h3>${currentName?currentName+" · ":""}${set.title}</h3>
      <div class="shots">${set.items.map(([k,c])=>shot(o,k,c)).join("")}</div>
      <div class="nophoto">등록된 사진이 없습니다</div>
    </div>`).join("");
}

function openDetail(i){
  const o=DATA[i];
  currentName=o.업체명||"";
  document.getElementById("dName").textContent=o.업체명;
  document.getElementById("dSub").textContent=
    [isEvent(o)?"이벤트":"정기",[o.타입1,type2Of(o)].filter(Boolean).join(" ")+(hasSalad(o)?" +샐러드":""),o.담당기사]
      .map(v=>(v||"").trim()).filter(Boolean).join(" · ");

  const steps=[
    ["진입 · 주차","진입주차"],["출입 절차","출입절차"],
    ["세팅","세팅"],["퇴식 · 회수","퇴식회수"]
  ].map(([label,key],n)=>`
    <div class="step">
      <div class="num">${String(n+1).padStart(2,"0")}</div>
      <div class="stepbody">
        <div class="steplabel">${label}</div>
        <div class="steptext${o[key]?"":" empty"}">${o[key]||"등록된 내용 없음"}</div>
      </div>
    </div>`).join("");

  const lat=o.위도, lng=o.경도;
  const q=encodeURIComponent(o.주소||o.업체명);
  const hasGeo = lat && lng;
  const toUrl = hasGeo ? `https://map.kakao.com/link/to/${encodeURIComponent(o.업체명)},${lat},${lng}`
                       : `https://map.kakao.com/?q=${q}`;
  const rvUrl = hasGeo ? `https://map.kakao.com/link/roadview/${lat},${lng}`
                       : `https://map.kakao.com/?q=${q}`;

  const dayChips = (o.운영요일||"").trim()
    ? `<div class="days big">${WEEK.map(d=>{
        const on=(o.운영요일||"").includes(d);
        return `<div class="d${on?" on":""}${d===todayCh?" now":""}">${d}</div>`;
      }).join("")}</div>`
    : "";

  document.getElementById("dBody").innerHTML=`
    <div class="panel titlepanel">
      <div class="dtitle">${o.업체명||""}</div>
      <div class="badges">
        <span class="b ${isEvent(o)?"c-event":"c-reg"}">${isEvent(o)?"이벤트":"정기"}</span>
        ${o.타입1?`<span class="b type1 t-${(o.타입1||"").replace("+","플러스")}">${o.타입1}</span>`:""}
        ${type2Of(o)?`<span class="b">${type2Of(o)}</span>`:""}
        ${hasSalad(o)?`<span class="b salad">+샐러드</span>`:""}
        ${o.담당기사?`<span class="b">${o.담당기사}</span>`:""}
        ${endBadge(o)}
      </div>
      ${dayChips?`<div class="daywrap"><span class="daylabel">운영 요일</span>${dayChips}</div>`:""}
      ${o.종료일?`<div class="endnote">${(()=>{const n=daysLeft(o);
        if(n===null) return "";
        if(n<0) return `${o.종료일}자로 종료되었습니다`;
        if(n===0) return `오늘(${o.종료일})이 마지막 날입니다`;
        return `${o.종료일}까지 · ${n}일 남음`;})()}</div>`:""}
    </div>

    ${mealRows(o)?`<div class="panel">
      <h3>시간 · 식수</h3>
      ${mealRows(o)}
    </div>`:""}

    <div class="panel">
      <h3>주소</h3>
      <div class="addr">${o.주소||"주소 미등록"}</div>
      <div class="mapbtns">
        <a class="mapbtn" href="${toUrl}" target="_blank" rel="noopener">길찾기</a>
        <a class="mapbtn alt" href="${rvUrl}" target="_blank" rel="noopener">${hasGeo?"로드뷰":"지도에서 보기"}</a>
      </div>
    </div>

    ${photoPanels(o)}

    ${videoPanel(o)}

    ${o.특이사항?`<div class="panel note"><h3>꼭 확인</h3><p>${o.특이사항}</p></div>`:""}

    <div class="panel">
      <h3>현장 절차</h3>
      <div class="steps">${steps}</div>
    </div>`;

  document.getElementById("sheet").classList.add("open");
  document.getElementById("sheet").scrollTop=0;
}

/* ── 지도 ── */
/* 주소 뒤 건물명·층수 등을 떼어내 인식률을 높인다 */
function addrVariants(a){
  a=(a||"").trim();
  const out=[a];
  // "... 114 서경빌딩 7층" → "... 114"
  const m=/^(.*?\d+(?:-\d+)?)\s+\S.*$/.exec(a);
  if(m && m[1]!==a) out.push(m[1]);
  // 괄호 제거
  const noParen=a.replace(/\(.*?\)/g,"").trim();
  if(noParen && !out.includes(noParen)) out.push(noParen);
  return out;
}

let geoNote="";
function geocodeMissing(list){
  const need=list.filter(o=>(!o.위도||!o.경도)&&o.주소&&!o._geoDone);
  if(!need.length) return Promise.resolve();
  if(!(kakao.maps.services&&kakao.maps.services.Geocoder)){
    geoNote="주소 변환 기능(services)이 로드되지 않았습니다.";
    return Promise.resolve();
  }
  const g=new kakao.maps.services.Geocoder();
  const findOne=(o)=>new Promise(res=>{
    const tries=addrVariants(o.주소);
    let i=0;
    const step=()=>{
      if(i>=tries.length){ o._geoDone=true; res(); return; }
      g.addressSearch(tries[i++],(r,st)=>{
        if(st===kakao.maps.services.Status.OK&&r&&r[0]){
          o.위도=r[0].y; o.경도=r[0].x; o._geoDone=true; res();
        } else if(st===kakao.maps.services.Status.ERROR){
          geoNote="주소 변환 요청이 거부되었습니다. 카카오 개발자 사이트에서 카카오맵 사용 설정과 도메인 등록을 확인하세요.";
          o._geoDone=true; res();
        } else step();
      });
    };
    step();
  });
  return Promise.all(need.map(findOne));
}

async function renderMap(){
  if(typeof kakao==="undefined"||!kakao.maps){
    document.getElementById("map").innerHTML=
      `<div class="empty">지도를 불러오지 못했습니다.<br>카카오 개발자 사이트에서 이 사이트 도메인이<br>JavaScript SDK 도메인에 등록되어 있는지 확인하세요.</div>`;
    return;
  }
  if(!mapReady){
    map=new kakao.maps.Map(document.getElementById("map"),{
      center:new kakao.maps.LatLng(37.35,127.05), level:10
    });
    map.addControl(new kakao.maps.ZoomControl(), kakao.maps.ControlPosition.RIGHT);
    mapReady=true;
  }

  await geocodeMissing(visible());
  const shown=visible();
  const pts=shown.filter(o=>o.위도&&o.경도);
  const missing=shown.length-pts.length;

  overlays.forEach(ov=>ov.setMap(null));
  overlays=[];

  const bounds=new kakao.maps.LatLngBounds();
  pts.forEach(o=>{
    const open=isOpenToday(o);
    const color = !open ? "#B6BDB6" : (o.계약==="이벤트" ? "#B8730B" : "#1F6F5C");
    const pos=new kakao.maps.LatLng(+o.위도,+o.경도);
    bounds.extend(pos);

    const el=document.createElement("div");
    el.className="marker";
    el.innerHTML=`<div class="pin" style="background:${color}"><i>${(o.업체명||"?").slice(0,1)}</i></div>
                  <div class="plabel${open?"":" dim"}">${o.업체명}</div>`;
    el.onclick=()=>openDetail(DATA.indexOf(o));

    const ov=new kakao.maps.CustomOverlay({position:pos,content:el,yAnchor:1,clickable:true});
    ov.setMap(map);
    overlays.push(ov);
  });

  const warn=document.getElementById("mapwarn");
  const msg = geoNote ? geoNote
            : (missing ? `주소를 찾지 못한 ${missing}곳은 지도에 없습니다. 시트에 위도·경도를 직접 넣어주세요.` : "");
  warn.textContent = msg;
  warn.classList.toggle("hidden",!msg);

  setTimeout(()=>{
    map.relayout();
    if(pts.length) map.setBounds(bounds,50,50,50,50);
  },80);
}

/* ── 이벤트 ── */
const qEl=document.getElementById("q"), clearEl=document.getElementById("clear");
qEl.addEventListener("input",()=>{
  query=qEl.value.trim();
  clearEl.classList.toggle("hidden",!query);
  view==="list"?renderList():renderMap();
});
clearEl.onclick=()=>{ qEl.value=""; query=""; clearEl.classList.add("hidden");
  view==="list"?renderList():renderMap(); qEl.focus(); };

document.getElementById("cards").addEventListener("click",e=>{
  const c=e.target.closest(".gcard"); if(c) openDetail(+c.dataset.i);
});
document.getElementById("back").onclick=()=>document.getElementById("sheet").classList.remove("open");

const lb=document.getElementById("lightbox");
document.getElementById("dBody").addEventListener("click",e=>{
  const f=e.target.closest(".shot"); if(!f) return;
  document.getElementById("lbimg").src=f.dataset.src;
  document.getElementById("lbcap").textContent=
    [currentName, f.dataset.cap].filter(Boolean).join(" · ");
  lb.classList.add("open");
});
lb.onclick=()=>lb.classList.remove("open");
document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("on"));
  t.classList.add("on"); view=t.dataset.view;
  document.getElementById("listView").classList.toggle("hidden",view!=="list");
  document.getElementById("mapView").classList.toggle("hidden",view!=="map");
  view==="map"?renderMap():renderList();
});

/* ── 시작 ── */
document.getElementById("todayLabel").textContent =
  `${now.getMonth()+1}.${now.getDate()} (${todayCh})`;

async function start(){
  if(API_URL){
    try{
      const r=await fetch(API_URL+"?action=list&_t="+Date.now(), {cache:"no-store"});
      const j=await r.json();
      if(j && j.ok && j.rows && j.rows.length) DATA=j.rows;
      else throw new Error("empty");
    }catch(e){
      DATA=SAMPLE;
      const w=document.getElementById("mapwarn");
      w.textContent="최신 정보를 불러오지 못해 저장된 내용을 표시합니다.";
      w.classList.remove("hidden");
    }
  } else DATA=SAMPLE;
  renderList(); renderMap();
}

if(typeof kakao!=="undefined"&&kakao.maps) kakao.maps.load(start);
else start();
</script>
